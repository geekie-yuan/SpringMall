server:
  port: 8080

spring:
  application:
    name: shoppingMall
  profiles:
    active: dev
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/mall?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: site.geekie.shop.shoppingmall.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

jwt:
  secret: dGhpc2lzYXJhbmRvbWtleWZvcmhtYWMyNTZhbGdvcml0aG0xMjM0NTY3ODkw
  expiration: 86400000  # 24 hours

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

pagehelper:
  helper-dialect: mysql
  reasonable: true

alipay:
  app-id: ${ALIPAY_APP_ID:支付宝号}
  private-key: ${ALIPAY_PRIVATE_KEY:支付宝私钥}
  alipay-public-key: ${ALIPAY_PUBLIC_KEY:支付宝公钥}
  server-url: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  format: json
  charset: UTF-8
  sign-type: RSA2
  notify-url: ${ALIPAY_NOTIFY_URL:https://anders-unattractable-coinstantaneously.ngrok-free.dev/api/v1/payment/alipay/notify}
  return-url: ${ALIPAY_RETURN_URL:http://localhost:3000/payment/result}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

logging:
  level:
    site.geekie.shop.shoppingmall: debug
    org.springframework.security: debug
