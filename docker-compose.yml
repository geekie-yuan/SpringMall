services:
  mysql:
    image: mysql:8.0
    container_name: mysql-mall
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-123456}
      - MYSQL_DATABASE=${DB_NAME:-mall}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mall-backend/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mall-network

  redis:
    image: redis:latest
    container_name: redis-mall
    command: redis-server --requirepass ${REDIS_PASSWORD:-123456}
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-123456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mall-network

  rabbitmq:
    image: rabbitmq:management
    container_name: rabbitmq-mall
    hostname: rabbitmq.local
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-admin}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS:-123456}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mall-network

  backend:
    build:
      context: ./mall-backend
      dockerfile: Dockerfile
    container_name: mall-backend
    ports:
      - "${BACKEND_PORT:-25116}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-mall}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-123456}
      - JWT_SECRET=${JWT_SECRET:-dGhpc2lzYXJhbmRvbWtleWZvcmhtYWMyNTZhbGdvcml0aG0xMjM0NTY3ODkw}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-123456}
      - RABBITMQ_HOST=${RABBITMQ_HOST:-rabbitmq}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USER=${RABBITMQ_USER:-admin}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-123456}
      - ALIPAY_APP_ID=${ALIPAY_APP_ID:-}
      - ALIPAY_PRIVATE_KEY=${ALIPAY_PRIVATE_KEY:-}
      - ALIPAY_PUBLIC_KEY=${ALIPAY_PUBLIC_KEY:-}
      - ALIPAY_NOTIFY_URL=${ALIPAY_NOTIFY_URL:-}
      - ALIPAY_RETURN_URL=${ALIPAY_RETURN_URL:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - STRIPE_ENABLED=${STRIPE_ENABLED:-true}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_REFUND_WEBHOOK_SECRET=${STRIPE_REFUND_WEBHOOK_SECRET:-}
      - STRIPE_SUCCESS_URL=${STRIPE_SUCCESS_URL:-}
      - STRIPE_CANCEL_URL=${STRIPE_CANCEL_URL:-}
      - STRIPE_TEST_MODE=${STRIPE_TEST_MODE:-true}
      - PRODUCT_IMAGE_BASE_URL=${PRODUCT_IMAGE_BASE_URL:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - mall-network

  frontend:
    build:
      context: ./mall-frontend
      dockerfile: Dockerfile
    container_name: mall-frontend
    ports:
      - "${FRONTEND_PORT:-26115}:80"
    depends_on:
      - backend
    networks:
      - mall-network

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:

networks:
  mall-network:
    driver: bridge
