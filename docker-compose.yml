services:
  backend:
    build:
      context: ./mall-backend
      dockerfile: Dockerfile
    container_name: mall-backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BACKEND_PORT:-25116}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - DB_HOST=${DB_HOST:-host.docker.internal}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-mall}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-123456}
      - JWT_SECRET=${JWT_SECRET:-dGhpc2lzYXJhbmRvbWtleWZvcmhtYWMyNTZhbGdvcml0aG0xMjM0NTY3ODkw}
      - REDIS_HOST=${REDIS_HOST:-host.docker.internal}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-123456}
      - RABBITMQ_HOST=${RABBITMQ_HOST:-rabbitmq}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USER=${RABBITMQ_USER:-admin}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-123456}
      - ALIPAY_APP_ID=${ALIPAY_APP_ID:-}
      - ALIPAY_PRIVATE_KEY=${ALIPAY_PRIVATE_KEY:-}
      - ALIPAY_PUBLIC_KEY=${ALIPAY_PUBLIC_KEY:-}
      - ALIPAY_NOTIFY_URL=${ALIPAY_NOTIFY_URL:-}
      - ALIPAY_RETURN_URL=${ALIPAY_RETURN_URL:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - STRIPE_ENABLED=${STRIPE_ENABLED:-true}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_REFUND_WEBHOOK_SECRET=${STRIPE_REFUND_WEBHOOK_SECRET:-}
      - STRIPE_SUCCESS_URL=${STRIPE_SUCCESS_URL:-}
      - STRIPE_CANCEL_URL=${STRIPE_CANCEL_URL:-}
      - STRIPE_TEST_MODE=${STRIPE_TEST_MODE:-true}
      - PRODUCT_IMAGE_BASE_URL=${PRODUCT_IMAGE_BASE_URL:-}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - mall-network

  frontend:
    build:
      context: ./mall-frontend
      dockerfile: Dockerfile
    container_name: mall-frontend
    ports:
      - "${FRONTEND_PORT:-26115}:80"
    depends_on:
      - backend
    networks:
      - mall-network

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: mall-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-admin}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS:-123456}
    ports:
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mall-network

networks:
  mall-network:
    driver: bridge
