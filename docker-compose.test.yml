# 测试环境 override
# 用法: docker compose -f docker-compose.yml -f docker-compose.test.yml --env-file .env.test up -d --build
services:
  mysql:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M

  redis:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  rabbitmq:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  backend:
    environment:
      - SPRING_PROFILES_ACTIVE=test
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/categories || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
